name: Dependabot auto-merge
on: pull_request

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'dependabot[bot]'
    steps:
      - name: Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"
      - name: Auto-merge PR if patch
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        # No --auto: neither main nor development has branch protection /
        # required checks, so --auto's async "enable auto-merge, merge later"
        # semantics buy nothing here and only risk a race with the dispatch
        # step below. A direct merge only returns once it has actually happened.
        run: gh pr merge --merge "$PR_URL"
        env:
          PR_URL: ${{github.event.pull_request.html_url}}
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
      - name: Dispatch publish workflow
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch'
        run: gh workflow run publish.yml --ref "${{ github.event.pull_request.base.ref }}"
        env:
          GH_TOKEN: ${{secrets.GITHUB_TOKEN}}
